<div class="header">
  <ng-template [ngFor] let-page [ngForOf]="pages">
    <div *ngIf="page.enabled" (mousedown)="selectPage(page)" [class.active]="page.active" class="item" [class]="page.class">
      <h6 class="title">
        {{ page.title}}
      </h6>
    </div>
  </ng-template>
</div>
<div class="content" *ngIf="!headerOnly">
<ng-content></ng-content>
</div>
