<div class="header">
  <ng-template [ngFor] let-page [ngForOf]="pages">
    @if (page.enabled) {
      <div (mousedown)="selectPage(page)" [class.active]="page.active" class="item" [class]="page.class">
        <h6 class="title">
          {{ page.title}}
        </h6>
      </div>
    }
  </ng-template>
</div>
@if (!headerOnly) {
  <div class="content">
    <ng-content></ng-content>
  </div>
}
