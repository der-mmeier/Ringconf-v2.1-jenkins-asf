<input type="text" autocomplete="{{autocomplete}}" spellcheck="{{spellcheck}}" class="{{class}}"
       maxLength="{{maxlength.toFixed()}}" value="{{value}}" (input)="_onChange(input.value)" #input>
<div class="info-text" *ngIf="onInfotextFormat != null"
     [innerHTML]="onInfotextFormat ? (onInfotextFormat(value, maxlength) | safeHtml) : value">
</div>
