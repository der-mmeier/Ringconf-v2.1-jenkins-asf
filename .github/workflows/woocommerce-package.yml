name: WooCommerce Package

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:

jobs:
  build:
    name: Build WooCommerce package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: npm ci

      - name: Build and validate WooCommerce plugin package
        run: npm run build:woocommerce

      - name: Exercise ZIP validator regression probes
        run: npm run test:wordpress-package-validator
